repos:
  - repo: local
    hooks:
      - id: git-diff-check
        name: git diff whitespace/conflict check
        entry: git --no-pager diff --check --cached --
        language: system
        pass_filenames: false
      - id: verify-syntax
        name: bootstrap verify syntax
        entry: bash bootstrap/verify.sh syntax
        language: system
        pass_filenames: false
      - id: verify-fmt-check
        name: bootstrap verify fmt-check
        entry: bash bootstrap/verify.sh fmt-check
        language: system
        pass_filenames: false
      - id: check-staged-no-binary
        name: block staged binary files
        entry: bash .githooks/check-staged-no-binary.sh
        language: system
        pass_filenames: false
      - id: check-staged-file-size
        name: block staged files larger than 2 MB
        entry: bash .githooks/check-staged-file-size.sh 2048
        language: system
        pass_filenames: false
